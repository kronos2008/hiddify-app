name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: make android-apk-install-deps

      - name: Prepare
        run: make android-apk-prepare

      - name: Build APK
        run: make android-apk-release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hiddify-app
          path: dist/**/*.apk
